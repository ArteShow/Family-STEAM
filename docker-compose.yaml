services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    env_file:
      - ./config/docker.env
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - disknet

  migrate:
    image: migrate/migrate
    container_name: migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    entrypoint: >
      migrate
      -path /migrations 
      -database postgres://postgres:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
      up
    networks:
      - disknet

  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    env_file:
      - ./config/docker.env
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${API_GATEWAY_PORT}/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - disknet

  calender-service:
    build: ./services/calender-service
    container_name: calender-service
    env_file:
      - ./config/docker.env
    ports:
      - "${CALENDER_SERVICE_PORT}:${CALENDER_SERVICE_PORT}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${CALENDER_SERVICE_PORT}/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - disknet

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    env_file:
      - ./config/docker.env
    ports:
      - "${AUTH_SERVICE_PORT}:${AUTH_SERVICE_PORT}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${AUTH_SERVICE_PORT}/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - disknet

  user-service:
    build: ./services/user-service
    container_name: user-service
    env_file:
      - ./config/docker.env
    ports:
      - "${USER_SERVICE_HTTP_PORT}:${USER_SERVICE_HTTP_PORT}"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${USER_SERVICE_HTTP_PORT}/user-service/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - disknet

  camp-service:
    build: ./services/camp-service
    container_name: camp-service
    env_file:
      - ./config/docker.env
    ports:
      - "${CAMP_SERVICE_PORT}:${CAMP_SERVICE_PORT}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${CAMP_SERVICE_PORT}/camp-service/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - disknet

  file-service:
    build: ./services/file-service
    container_name: file-service
    env_file:
      - ./config/docker.env
    ports:
      - "${FILE_SERVICE_PORT}:${FILE_SERVICE_PORT}"
    volumes:
      - "family-steam:/data"
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${FILE_SERVICE_PORT}/file-service/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - disknet

  event-service:
    build: ./services/event-service
    container_name: event-service
    env_file:
      - ./config/docker.env
    ports:
      - "${EVENT_SERVICE_PORT}:${EVENT_SERVICE_PORT}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${EVENT_SERVICE_PORT}/event-service/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - disknet

  news-service:
    build: ./services/news-service
    container_name: news-service
    env_file:
      - ./config/docker.env
    ports:
      - "${NEWS_SERVICE_PORT}:${NEWS_SERVICE_PORT}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${NEWS_SERVICE_PORT}/news-service/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - disknet
  feedback-service:
    build: ./services/feedback-service
    container_name: feedback-service
    env_file:
      - ./config/docker.env
    ports:
      - "${FEEDBACK_SERVICE_PORT}:${FEEDBACK_SERVICE_PORT}"
    healthcheck:
      test: ["CMD", "wget", "-qO-"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - disknet
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "${FORNTEND_PORT}:${NGINX_PORT}"
    networks:
      - disknet

