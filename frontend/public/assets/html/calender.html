<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../images/favicon.png" type="image/png">
    <link rel="stylesheet" href="../css/nav.css">
    <link rel="stylesheet" href="../css/calender.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Family STEAM | ArteShow</title>
</head>
<body>
    <header>
        <img src="../images/logo_png.png" alt="logo">
        <nav>
            <a href="../../index.html">Home</a>
            <a href="">About Us</a>
            <a href="calender.html">Calender</a>
            <a href="">Short events</a>
            <a href="">Camps</a>
            <a href="">FAQ</a>
            <a href="">Contacts</a>
        </nav>
    </header>

    <main class="calendar-container">
        <h3>Calender</h3>
        <div class="calendar-header">
            <button id="prevMonth"><i class="fa-solid fa-chevron-left"></i></button>
            <h1 id="monthYear"></h1>
            <button id="nextMonth"><i class="fa-solid fa-chevron-right"></i></button>
            <button id="todayBtn" class="today-btn">Today</button>
        </div>

        <table class="calendar">
            <thead>
                <tr>
                    <th>Mon</th>
                    <th>Tue</th>
                    <th>Wed</th>
                    <th>Thu</th>
                    <th>Fri</th>
                    <th>Sat</th>
                    <th>Sun</th>
                </tr>
            </thead>
            <tbody id="calendarBody"></tbody>
        </table>

        <div id="eventsCard" class="events-card hidden">
            <h2 id="eventDate"></h2>
            <div id="eventsList" class="events-list"></div>
            <button id="closeBtn" class="close-btn">Close</button>
        </div>
    </main>

    <script src="../js/calender.js"></script>
    <script src="https://kit.fontawesome.com/d9e39d51d2.js" crossorigin="anonymous"></script>
</body>
</html>
